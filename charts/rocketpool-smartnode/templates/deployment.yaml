apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rocketpool-smartnode.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "rocketpool-smartnode.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rocketpool-smartnode.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "rocketpool-smartnode.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
{{ with .Values.podLabels }}
{{ toYaml . | nindent 8 }}
{{ end }}
{{ if .Values.podAnnotations }}
      annotations:
{{ toYaml .Values.podAnnotations | nindent 8 }}
{{ end }}
    spec:
      enableServiceLinks: false
{{ with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
{{ end }}
      containers:
        - name: smartnode
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: {{ dir .Values.persistence.mountPath }}
          command: {{- toYaml .Values.command | nindent 12 }}
          args: {{- toYaml .Values.args | nindent 12 }}
{{ with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{ end }}
          env:
            - name: HOME
              value: /data
          ports:
{{ if .Values.service.ports.api.enabled }}
            - name: api
              containerPort: {{ .Values.service.ports.api.targetPort }}
              protocol: TCP
{{ end }}
{{ if .Values.service.ports.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics.targetPort }}
              protocol: TCP
{{ end }}
          volumeMounts:
            - name: home
              mountPath: {{ .Values.persistence.mountPath }}
            - name: config
              mountPath: {{ .Values.persistence.mountPath }}/user-settings.yml
              subPath: user-settings.yml
{{ if .Values.walletPassword.existingSecret }}
            - name: wallet-password
              mountPath: {{ dir .Values.walletPassword.filePath }}
              readOnly: true
{{ end }}
          resources:
{{ toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: home
          persistentVolumeClaim:
{{ if .Values.persistence.existingClaim }}
            claimName: {{ .Values.persistence.existingClaim }}
{{ else }}
            claimName: {{ include "rocketpool-smartnode.fullname" . }}-data
{{ end }}
        - name: config
          configMap:
            name: {{ include "rocketpool-smartnode.fullname" . }}-config
{{ if .Values.walletPassword.existingSecret }}
        - name: wallet-password
          secret:
            secretName: {{ .Values.walletPassword.existingSecret }}
            items:
              - key: {{ .Values.walletPassword.existingSecretKey | default "password" }}
                path: {{ base .Values.walletPassword.filePath }}
{{ end }}
{{ with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{ end }}
{{ with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{ end }}
{{ with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{ end }}
