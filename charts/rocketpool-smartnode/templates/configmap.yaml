{{- $configPath := printf "config/%s/user-settings.yml" .Values.config.profile }}
{{- $configRaw := required (printf "missing Rocket Pool config file: %s" $configPath) (.Files.Get $configPath) }}
{{- $configParsed := fromYaml $configRaw }}
{{- $configVersion := "" }}
{{- $configNetwork := "" }}
{{- if and $configParsed (hasKey $configParsed "root") }}
{{-   $configVersion = index $configParsed.root "version" }}
{{- end }}
{{- if and $configParsed (hasKey $configParsed "smartnode") }}
{{-   $configNetwork = index $configParsed.smartnode "network" }}
{{- end }}
{{- if and $configVersion (ne $configVersion .Values.image.tag) }}
{{-   fail (printf "Rocket Pool config drift: %s has root.version=%s but image.tag=%s. Regenerate the profile with rocketpool/smartnode:%s (see README)." $configPath $configVersion .Values.image.tag .Values.image.tag) }}
{{- end }}
{{- if and $configNetwork (not (has $configNetwork (list "mainnet" "testnet"))) }}
{{-   fail (printf "Rocket Pool config error: %s has smartnode.network=%s. Smartnode %s supports only mainnet or testnet; use testnet for Hoodi/Saturn." $configPath $configNetwork .Values.image.tag) }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rocketpool-smartnode.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "rocketpool-smartnode.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  user-settings.yml: |
{{ $configRaw | nindent 4 }}
