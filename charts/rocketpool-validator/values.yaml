image:
  repository: sigp/lighthouse
  tag: v8.0.0
  pullPolicy: IfNotPresent

# Lighthouse VC network. Saturn testnet runs on Hoodi, so this defaults
# to `hoodi` while the rocketpool-smartnode chart uses the `testnet`
# profile (testnet == Hoodi in Saturn terminology). Set both to `mainnet`
# for production.
network: hoodi
beaconNodeUrl: http://cl-lighthouse-api:5052

# Validator keys are produced by the rocketpool-smartnode daemon at this
# path inside the shared PV. This pod is read-only against that directory;
# it will crash-loop until smartnode has been initialised and minipools
# have been created.
validatorDataDir: /data/.rocketpool/data/validators/lighthouse

replicaCount: 1
podAnnotations: {}
podLabels: {}

command: ["lighthouse"]
args: []

# Optional execution fee recipient for validator duties. For Rocket Pool
# nodes, set this to the node fee distributor address shown by
# `rocketpool-cli -c /.rocketpool/ node status`.
suggestedFeeRecipient: ""

persistence:
  enabled: true
  accessModes: ["ReadWriteOnce"]
  size: 50Gi
  # Match the smartnode chart default; same StorageClass is required when
  # using `existingClaim` to share a single PV between the two pods.
  storageClass: "local-storage-ssd"
  # Bind to the smartnode PVC (e.g. `<release>-rocketpool-smartnode-data`)
  # to share wallet + validator keys on one PV. With ReadWriteOnce, both
  # pods must land on the same node — set matching nodeSelector/affinity.
  existingClaim: ""
  mountPath: /data/.rocketpool

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  annotations: {}
  labels: {}
  ports:
    api:
      enabled: true
      port: 5062
      targetPort: 5062
    metrics:
      enabled: true
      port: 5064
      targetPort: 5064

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}
